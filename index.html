<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Catequizandos</title>
  <style>
    :root {
      --ink: #202124;
      --muted: #5f6368;
      --line: #dadce0;
      --paper: #ffffff;
      --soft: #f6f3ec;
      --gold: #b8862b;
      --green: #2f6f57;
      --green-dark: #245642;
      --danger: #b3261e;
      --ok: #146c43;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--soft);
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.45;
    }

    .page {
      width: min(100%, 960px);
      margin: 0 auto;
      padding: 24px;
    }

    .shell {
      background: var(--paper);
      border: 1px solid rgba(184, 134, 43, 0.28);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(32, 33, 36, 0.12);
    }

    .header {
      display: grid;
      grid-template-columns: 116px 1fr;
      gap: 20px;
      align-items: center;
      padding: 28px;
      border-top: 7px solid var(--gold);
      background: linear-gradient(180deg, #fffaf0 0%, #ffffff 100%);
    }

    .logo {
      width: 116px;
      height: 116px;
      object-fit: contain;
      border-radius: 50%;
      background: #fff;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.55rem, 2vw, 2.05rem);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 1rem;
    }

    form {
      padding: 28px;
      display: grid;
      gap: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label,
    .label {
      font-weight: 700;
      font-size: 0.95rem;
    }

    .required {
      color: var(--danger);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 12px 13px;
      min-height: 48px;
    }

    textarea {
      resize: vertical;
      min-height: 112px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 3px solid rgba(47, 111, 87, 0.18);
      border-color: var(--green);
    }

    .choices {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .choice {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      padding: 9px 12px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      font-weight: 400;
    }

    .choice input {
      width: 18px;
      height: 18px;
      min-height: 18px;
      padding: 0;
      accent-color: var(--green);
    }

    .capela-area[hidden] {
      display: none;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding-top: 8px;
    }

    button {
      border: 0;
      border-radius: 6px;
      background: var(--green);
      color: #fff;
      cursor: pointer;
      font: inherit;
      font-weight: 700;
      min-height: 48px;
      padding: 12px 22px;
    }

    button:hover {
      background: var(--green-dark);
    }

    button:disabled {
      cursor: wait;
      opacity: 0.72;
    }

    .message {
      min-height: 24px;
      font-weight: 700;
    }

    .message.ok {
      color: var(--ok);
    }

    .message.error {
      color: var(--danger);
    }

    .footnote {
      padding: 0 28px 26px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .hidden-frame {
      display: none;
      width: 0;
      height: 0;
      border: 0;
    }

    @media (max-width: 680px) {
      .page {
        padding: 12px;
      }

      .header {
        grid-template-columns: 1fr;
        justify-items: center;
        text-align: center;
        padding: 22px 18px;
      }

      .logo {
        width: 104px;
        height: 104px;
      }

      form {
        padding: 20px 16px;
      }

      .grid {
        grid-template-columns: 1fr;
      }

      .choices {
        display: grid;
        grid-template-columns: 1fr;
      }

      button {
        width: 100%;
      }

      .footnote {
        padding: 0 16px 20px;
      }
    }
  </style>
</head>

                <input type="radio" name="localCatequese" value="Santuario" required>
                Santu&aacute;rio
              </label>
              <label class="choice">
                <input type="radio" name="localCatequese" value="Capela" required>
                Capela
              </label>
            </div>
          </div>

          <div class="field full capela-area" id="capelaArea" hidden>
            <label for="nomeCapela">Nome da capela <span class="required">*</span></label>
            <input id="nomeCapela" name="nomeCapela" type="text">
          </div>

          <div class="field full">
            <span class="label">J&aacute; recebeu o Sacramento da Primeira Eucaristia? <span class="required">*</span></span>
            <div class="choices" role="radiogroup" aria-label="Primeira Eucaristia">
              <label class="choice">
                <input type="radio" name="primeiraEucaristia" value="Sim" required>
                Sim
              </label>
              <label class="choice">
                <input type="radio" name="primeiraEucaristia" value="Nao" required>
                N&atilde;o
              </label>
              <label class="choice">
                <input type="radio" name="primeiraEucaristia" value="Nao sei" required>
                N&atilde;o sei
              </label>
            </div>
          </div>

          <div class="field full">
            <label for="observacoes">Observa&ccedil;&otilde;es</label>
            <textarea id="observacoes" name="observacoes"></textarea>
          </div>
        </div>

        <div class="actions">
          <button type="submit" id="submitButton">Enviar cadastro</button>
          <div class="message" id="message" aria-live="polite"></div>
        </div>
      </form>

      <p class="footnote">Os campos marcados com * s&atilde;o obrigat&oacute;rios.</p>
      <iframe class="hidden-frame" name="submitFrame" id="submitFrame" title="Envio do cadastro"></iframe>
    </section>
  </main>

  <script>
    const form = document.getElementById('cadastroForm');
    const capelaArea = document.getElementById('capelaArea');
    const nomeCapela = document.getElementById('nomeCapela');
    const submitButton = document.getElementById('submitButton');
    const message = document.getElementById('message');
    const submitFrame = document.getElementById('submitFrame');
    let submitted = false;

    form.localCatequese.forEach((option) => {
      option.addEventListener('change', () => {
        const isCapela = form.localCatequese.value === 'Capela';
        capelaArea.hidden = !isCapela;
        nomeCapela.required = isCapela;
        if (!isCapela) {
          nomeCapela.value = '';
        }
      });
    });

    form.addEventListener('submit', (event) => {
      if (!form.checkValidity()) {
        event.preventDefault();
        form.reportValidity();
        return;
      }

      submitted = true;
      submitButton.disabled = true;
      submitButton.textContent = 'Enviando...';
      message.className = 'message';
      message.textContent = '';
    });

    submitFrame.addEventListener('load', () => {
      if (!submitted) return;

      submitted = false;
      message.className = 'message ok';
      message.textContent = 'Cadastro enviado com sucesso.';
      form.reset();
      capelaArea.hidden = true;
      nomeCapela.required = false;
      submitButton.disabled = false;
      submitButton.textContent = 'Enviar cadastro';
    });
  </script>
</body>
</html>
